# config.example.yaml
# Copiar para config.yaml e preencher com os valores reais.
# NUNCA commitar o config.yaml — ele contém credenciais.

telegram:
  token: ""       # token do bot (obtido via @BotFather)
  chat_id: ""     # canal padrão quando nenhum canal específico for encontrado

# Token para autenticar chamadas à API /notify
# Gerar com: openssl rand -hex 32
notify_token: ""

# Canais de entrega — cada projeto pode ter o seu
# tipo "telegram" é o único suportado por ora
canais:
  - nome: pessoal
    tipo: telegram
    chat_id: ""
  - nome: meu-app
    tipo: telegram
    chat_id: ""

# Serviços monitorados
services:
  - name: meu-app
    health_url: http://127.0.0.1:8000/health
    channel: meu-app   # referência a um canal acima para este serviço

# Configurações do servidor
# Backups automáticos (opcional — remover seção se não usar)
backups:
  - nome: meu-app
    caminho: /caminho/para/banco.db
    bucket: meu-bucket-backups
    retencao_dias: 7
    hora: 3            # hora UTC para rodar o backup (0-23)

# Monitoramento GCP free tier (opcional — remover seção se não usar GCP)
gcp:
  projeto: ""           # id do projeto GCP
  limite_egress_mb: 1024  # limite mensal de egress em MB (padrão: 1024 = 1 GB free tier)

server:
  check_interval: 60      # segundos entre healthchecks
  api_port: 8765          # porta da API /notify (escuta apenas em localhost)
  alert_cooldown_min: 30  # minutos entre alertas repetidos de serviço fora
  limite_disco_pct: 85    # percentual de disco que dispara alerta
  limite_memoria_pct: 90  # percentual de memória que dispara alerta
